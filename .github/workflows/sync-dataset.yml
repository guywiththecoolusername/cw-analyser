name: Sync Anime Dataset

on:
  schedule:
    - cron: "0 2 * * *"   # runs daily at 02:00 UTC
  workflow_dispatch:      # allows manual run

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get dates
        id: dates
        run: |
          echo "today=$(date -u +%Y%m%d)" >> $GITHUB_OUTPUT
          echo "yesterday=$(date -u -d 'yesterday' +%Y%m%d)" >> $GITHUB_OUTPUT

      - name: Download dataset (with fallback)
        run: |
          url1="https://raw.githubusercontent.com/LeoRigasaki/Anime-dataset/main/data/raw/anilist_seasonal_${{ steps.dates.outputs.today }}.csv"
          url2="https://raw.githubusercontent.com/LeoRigasaki/Anime-dataset/main/data/raw/anilist_seasonal_${{ steps.dates.outputs.yesterday }}.csv"

          echo "Trying today..."
          curl -f -o data.csv $url1 || (
            echo "Falling back to yesterday..."
            curl -f -o data.csv $url2
          )

      - name: Check for changes
        run: |
          if git diff --quiet data.csv; then
            echo "No changes"
            echo "changed=false" >> $GITHUB_ENV
          else
            echo "File changed"
            echo "changed=true" >> $GITHUB_ENV
          fi

      - name: Commit & push
        if: env.changed == 'true'
        run: |
          git config user.name "dataset-bot"
          git config user.email "bot@example.com"
          git add data.csv
          git commit -m "Update dataset"
          git push
